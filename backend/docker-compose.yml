version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: realworld-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: realworld

  backend:
    build: .
    container_name: conduit-backend
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://devuser:devpass@postgres:5432/realworld
    ports:
      - "3000:3000"

