apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 300931013610.dkr.ecr.us-east-1.amazonaws.com/project-devops-1/backend:v2
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: REDIS_URL
        - name: S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: S3_BUCKET
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: AWS_REGION
